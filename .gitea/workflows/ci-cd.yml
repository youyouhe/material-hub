name: CI/CD

# 触发:推送到任意分支(check),推送到 main(check + deploy),手动
on:
  push:
    branches:
      - '*'
  workflow_dispatch:

# 全局环境:Mac runner 的 PATH 很窄,需补上 python3.12 / node
env:
  PATH_PREPEND: "/usr/local/bin:$HOME/node/bin"

jobs:
  # ============================================================
  # Stage 1: check — 前端类型检查 + 构建 + 后端依赖检查
  # ============================================================
  check:
    runs-on: self-hosted
    steps:
      - name: 拉取代码
        env:
          GT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          export PATH="/usr/local/bin:$HOME/node/bin:$PATH"
          git clone --depth 1 "http://x-access-token:${GT}@10.0.0.2:3000/hem/material-hub.git" . \
            || git clone --depth 1 "http://10.0.0.2:3000/hem/material-hub.git" .
          echo "✓ HEAD: $(git rev-parse --short HEAD)"
          echo "Python: $(python3 --version)"

      - name: 前端类型检查 (tsc --noEmit)
        run: |
          set -e
          export PATH="/usr/local/bin:$HOME/node/bin:$PATH"
          cd frontend
          npm install --no-audit --no-fund
          echo "---- tsc 类型检查 ----"
          npx tsc --noEmit
          echo "✓ 类型检查通过"

      - name: 前端构建 (vite build)
        run: |
          set -e
          export PATH="/usr/local/bin:$HOME/node/bin:$PATH"
          cd frontend
          npm run build
          echo "---- dist 产物 ----"
          ls -lh dist/ | head

      - name: 后端依赖安装检查 (Python 3.12)
        run: |
          set -e
          export PATH="/usr/local/bin:$HOME/node/bin:$PATH"
          PYBIN=$(command -v python3.12 || command -v python3.11 || command -v python3.10 || echo /usr/local/bin/python3)
          echo "使用 Python: $PYBIN ($($PYBIN --version))"
          $PYBIN -m venv /tmp/ci-venv
          source /tmp/ci-venv/bin/activate
          pip install --upgrade pip
          cd backend
          pip install -r requirements.txt
          echo "✓ 后端依赖全部可安装"

      - name: 后端 import 检查
        run: |
          set -e
          source /tmp/ci-venv/bin/activate
          cd backend
          python -c "
          import importlib
          mods = ['main', 'dms_models', 'dms_processor', 'dms_search', 'llm_provider',
                  'kb_database', 'kb_models', 'kb_ingest', 'kb_search', 'kb_multihop',
                  'kb_graph', 'kb_extraction', 'kb_entity_sync', 'kb_event_ingest',
                  'kb_chunking', 'kb_embedding', 'kb_asr', 'kb_docx', 'chat_tools']
          failed = []
          for m in mods:
              try: importlib.import_module(m)
              except Exception as e: failed.append((m, str(e)[:80]))
          if failed:
              for m, e in failed: print(f'  ✗ {m}: {e}')
              raise SystemExit(f'❌ {len(failed)} 个模块导入失败')
          print(f'✓ {len(mods)} 个核心模块导入成功')
          "

      - name: 归档前端构建产物
        run: |
          mkdir -p "$HOME/artifacts/materialhub-frontend"
          rm -rf "$HOME/artifacts/materialhub-frontend/dist"
          cp -r frontend/dist "$HOME/artifacts/materialhub-frontend/dist"
          echo "✓ dist 已归档"

      - name: 清理临时 venv
        if: always()
        run: rm -rf /tmp/ci-venv

  # ============================================================
  # Stage 2: deploy — 仅 main 分支,本地部署(Runner = 服务器)
  # ============================================================
  deploy:
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: 部署到本地服务器
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          export PATH="/usr/local/bin:$HOME/node/bin:$PATH"
          PYBIN=$(command -v python3.12 || command -v python3.11 || command -v python3.10 || echo /usr/local/bin/python3)
          echo "Python: $PYBIN ($($PYBIN --version))"

          if [ -z "$DEPLOY_PATH" ]; then
            echo "✗ 未配置 DEPLOY_PATH secret"
            exit 1
          fi
          echo "部署路径: $DEPLOY_PATH"

          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"
          echo "---- 同步代码 ----"
          REPO_URL="http://x-access-token:${GT}@10.0.0.2:3000/hem/material-hub.git"
          if [ ! -d ".git" ]; then
            echo "初始化 git 仓库"
            git init
            git remote add origin "$REPO_URL"
          else
            # 每次运行需更新 token(每次 run 的 GITHUB_TOKEN 不同)
            git remote set-url origin "$REPO_URL" 2>/dev/null || git remote add origin "$REPO_URL"
          fi
          git fetch --all
          git reset --hard origin/main
          echo "✓ 当前版本: $(git rev-parse --short HEAD)"

          echo "---- 创建/更新后端 venv (Python 3.12) ----"
          cd backend
          if [ ! -d "venv" ]; then
            echo "首次创建 venv"
            $PYBIN -m venv venv
          else
            # 检查现有 venv 版本,若非 3.10+ 则重建
            VENV_VER=$(venv/bin/python --version 2>&1 || echo "0.0")
            echo "现有 venv: $VENV_VER"
            if ! echo "$VENV_VER" | grep -qE "3\.(1[0-9]|[2-9][0-9])"; then
              echo "venv 版本过低,用 $PYBIN 重建"
              rm -rf venv
              $PYBIN -m venv venv
            fi
          fi
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✓ 后端依赖已更新"

          echo "---- 构建前端 ----"
          cd ../frontend
          npm install --no-audit --no-fund
          npm run build
          echo "✓ 前端构建完成"

      - name: 重启服务
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -e
          export PATH="/usr/local/bin:$HOME/node/bin:$PATH"
          cd "$DEPLOY_PATH"
          echo "---- 停止旧服务(launchd 管理) ----"
          launchctl remove materialhub.backend 2>/dev/null || true
          launchctl remove materialhub.frontend 2>/dev/null || true
          lsof -ti :8201 | xargs kill -9 2>/dev/null || true
          lsof -ti :3100 | xargs kill -9 2>/dev/null || true
          sleep 2

          echo "---- 写启动脚本(printf 避免 heredoc 破坏 YAML) ----"
          printf '#!/bin/bash\ncd "%s/backend"\nexec venv/bin/python main.py\n' "$DEPLOY_PATH" > "$DEPLOY_PATH/run-backend.sh"
          printf '#!/bin/bash\ncd "%s/frontend"\nexport PATH="/usr/local/bin:$HOME/node/bin:$PATH"\nexec npm run dev\n' "$DEPLOY_PATH" > "$DEPLOY_PATH/run-frontend.sh"
          chmod +x "$DEPLOY_PATH/run-backend.sh" "$DEPLOY_PATH/run-frontend.sh"

          echo "---- 通过 launchd 启动(完全脱离 runner 进程组) ----"
          launchctl submit -l materialhub.backend -o "$DEPLOY_PATH/backend.log" -e "$DEPLOY_PATH/backend.log" -- "$DEPLOY_PATH/run-backend.sh"
          launchctl submit -l materialhub.frontend -o "$DEPLOY_PATH/frontend.log" -e "$DEPLOY_PATH/frontend.log" -- "$DEPLOY_PATH/run-frontend.sh"
          sleep 2
          # 从 launchctl 取真实 PID 写入文件,让 status.sh 能正确显示
          launchctl list | grep materialhub.backend | awk "{print \$1}" > "$DEPLOY_PATH/.backend.pid"
          launchctl list | grep materialhub.frontend | awk "{print \$1}" > "$DEPLOY_PATH/.frontend.pid"
          echo "后端 PID: $(cat $DEPLOY_PATH/.backend.pid)"
          echo "前端 PID: $(cat $DEPLOY_PATH/.frontend.pid)"
          echo "✓ 服务已通过 launchd 启动"

      - name: 健康检查
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          export PATH="/usr/local/bin:$HOME/node/bin:$PATH"
          echo "---- 等待 Backend 就绪 ----"
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8201/health > /dev/null 2>&1; then
              echo "✓ Backend healthy (第 ${i} 次检查)"
              exit 0
            fi
            echo "  等待中... ($i/20)"
            sleep 2
          done
          echo "✗ Backend 健康检查失败"
          echo "---- 最近后端日志 ----"
          tail -30 "${DEPLOY_PATH}/backend.log" 2>/dev/null || true
          exit 1
